<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Amanthos – Refund-Status</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<header>
  <h1>Amanthos – Refunds</h1>
  <p>Refund-Status abfragen</p>
  <nav>
    <a href="index.html">Refund einreichen</a>
    <a href="status.html" class="active">Status prüfen</a>
  </nav>
</header>
<main>
  <div class="box">
    <label>E-Mail-Adresse</label>
    <input type="email" id="email" autocomplete="email">
    <label>Code</label>
    <input type="text" id="code" autocomplete="off" style="text-transform:uppercase;" placeholder="z. B. A1B2C3">
    <button class="btn" id="check">Status abrufen</button>
    <div class="msg" id="msg"></div>
  </div>
  <div class="box" id="result" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <h2 style="font-size:1.1rem;">Refund <span id="rCode"></span></h2>
      <span class="badge" id="rBadge"></span>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:0.95rem;margin-top:14px;">
      <tr><td style="padding:5px 0;color:#888;width:150px;">Objekt</td><td id="rLocation"></td></tr>
      <tr><td style="padding:5px 0;color:#888;">Gast</td><td id="rGuest"></td></tr>
      <tr><td style="padding:5px 0;color:#888;">Reservierung</td><td id="rRef"></td></tr>
      <tr><td style="padding:5px 0;color:#888;">Betrag</td><td id="rAmount"></td></tr>
    </table>
    <div id="rNoteWrap" style="display:none;margin-top:12px;padding:10px 14px;background:#f8f6f2;border-radius:8px;font-size:0.9rem;color:#555;">
      <strong>Hinweis:</strong> <span id="rNote"></span>
    </div>
    <h3 style="font-size:0.95rem;margin-top:20px;color:#666;">Verlauf</h3>
    <div class="timeline" id="rTimeline"></div>
  </div>
</main>
<footer>Amanthos AG · Früemattli 1 · 6404 Greppen</footer>
<script>
const API = 'https://amanthos-group-booking.onrender.com';
const LABELS = {
  eingereicht: 'Eingereicht',
  in_bearbeitung: 'In Bearbeitung',
  ausbezahlt: 'Ausbezahlt',
  abgelehnt: 'Abgelehnt',
};

function showMsg(cls, text) {
  const m = document.getElementById('msg');
  m.className = 'msg ' + cls;
  m.textContent = text;
}

function fmtTs(iso) {
  try {
    return new Date(iso).toLocaleString('de-CH', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  } catch { return iso; }
}

document.getElementById('check').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const code = document.getElementById('code').value.trim().toUpperCase();
  if (!email || !code) { showMsg('err', 'Bitte E-Mail und Code eingeben.'); return; }
  const btn = document.getElementById('check');
  btn.disabled = true;
  showMsg('info', 'Wird abgerufen… (kann bis zu 1 Minute dauern)');
  document.getElementById('result').style.display = 'none';
  try {
    const res = await fetch(API + '/refunds/status?' + new URLSearchParams({ email, code }));
    const out = await res.json();
    if (res.ok && out.ok) {
      showMsg('', '');
      const r = out.refund;
      document.getElementById('rCode').textContent = r.code;
      const badge = document.getElementById('rBadge');
      badge.textContent = r.statusLabel || LABELS[r.status] || r.status;
      badge.className = 'badge ' + r.status;
      document.getElementById('rLocation').textContent = r.location;
      document.getElementById('rGuest').textContent = r.guestName || '—';
      document.getElementById('rRef').textContent = r.bookingRef || '—';
      document.getElementById('rAmount').textContent = (r.currency || 'CHF') + ' ' + r.amount;
      const noteWrap = document.getElementById('rNoteWrap');
      if (r.adminNote) {
        document.getElementById('rNote').textContent = r.adminNote;
        noteWrap.style.display = 'block';
      } else { noteWrap.style.display = 'none'; }
      const tl = document.getElementById('rTimeline');
      tl.innerHTML = '';
      (r.history || []).forEach(h => {
        const d = document.createElement('div');
        const s = document.createElement('strong');
        s.textContent = LABELS[h.status] || h.status;
        const ts = document.createElement('div');
        ts.className = 'ts';
        ts.textContent = fmtTs(h.at);
        d.append(s, ts);
        tl.appendChild(d);
      });
      document.getElementById('result').style.display = 'block';
    } else if (res.status === 404) {
      showMsg('err', 'Kein Refund mit dieser E-Mail und diesem Code gefunden.');
    } else {
      showMsg('err', out.error || 'Abfrage fehlgeschlagen — bitte nochmals versuchen.');
    }
  } catch {
    showMsg('err', 'Abfrage fehlgeschlagen — bitte nochmals versuchen.');
  } finally {
    btn.disabled = false;
  }
};

fetch(API + '/healthz').catch(() => {});
</script>
</body>
</html>
